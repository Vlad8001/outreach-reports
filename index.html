<style>
  :root {
    --bg: #0a0e1a;
    --bg-grad: radial-gradient(ellipse 80% 60% at 50% -10%, #1a2138 0%, #0a0e1a 60%);
    --card: #121828;
    --card-hover: #161d2f;
    --border: #1f2940;
    --border-strong: #2a3654;
    --text: #e5e7eb;
    --text-muted: #8b95ad;
    --text-dim: #5b6680;
    --green: #4ade80;
    --green-bg: rgba(74, 222, 128, 0.1);
    --red: #f87171;
    --red-bg: rgba(248, 113, 113, 0.1);
    --amber: #fbbf24;
    --amber-bg: rgba(251, 191, 36, 0.1);
    --cyan: #22d3ee;
    --cyan-bg: rgba(34, 211, 238, 0.1);
    --serif: 'Instrument Serif', Georgia, serif;
    --sans: 'Plus Jakarta Sans', system-ui, sans-serif;
    --mono: 'JetBrains Mono', 'SF Mono', monospace;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    background: var(--bg);
    background-image: var(--bg-grad);
    background-attachment: fixed;
    color: var(--text);
    font-family: var(--sans);
    font-size: 15px;
    line-height: 1.55;
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }

  .container { max-width: 1280px; margin: 0 auto; padding: 32px 28px 120px; }

  /* Header */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding-bottom: 32px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 40px;
    flex-wrap: wrap;
    gap: 20px;
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 14px;
  }

  .logo-mark {
    width: 48px;
    height: 48px;
    display: flex;
    align-items: center;
    justify-content: center;
    filter: drop-shadow(0 4px 12px rgba(251, 191, 36, 0.25));
  }

  .logo-mark img {
    width: 100%;
    height: 100%;
    display: block;
  }

  .logo-text h1 {
    font-family: var(--serif);
    font-size: 28px;
    font-weight: 400;
    letter-spacing: -0.02em;
    line-height: 1;
  }

  .logo-text h1 em { font-style: italic; color: var(--amber); }

  .logo-text p {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.12em;
    margin-top: 4px;
  }

  /* Navigation */
  nav.tabs {
    display: flex;
    gap: 4px;
    padding: 4px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
  }

  nav.tabs button {
    background: transparent;
    border: none;
    color: var(--text-muted);
    font-family: var(--sans);
    font-size: 14px;
    font-weight: 500;
    padding: 9px 18px;
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.2s;
  }

  nav.tabs button:hover { color: var(--text); }

  nav.tabs button.active {
    background: var(--border-strong);
    color: var(--text);
  }

  /* Page intro */
  .page-intro {
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    margin-bottom: 32px;
    flex-wrap: wrap;
    gap: 20px;
  }

  .page-intro h2 {
    font-family: var(--serif);
    font-size: 56px;
    font-weight: 400;
    letter-spacing: -0.03em;
    line-height: 1;
  }

  .page-intro h2 em { font-style: italic; color: var(--amber); }

  .page-intro .subtitle {
    font-family: var(--mono);
    color: var(--text-dim);
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 0.15em;
    margin-top: 12px;
  }

  /* Date selector */
  .date-selector {
    display: flex;
    align-items: center;
    gap: 10px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 6px;
  }

  .date-selector select {
    background: transparent;
    border: none;
    color: var(--text);
    font-family: var(--mono);
    font-size: 13px;
    padding: 8px 14px;
    cursor: pointer;
    outline: none;
  }

  .date-selector select option { background: var(--card); }

  .date-selector .badge {
    background: var(--amber-bg);
    color: var(--amber);
    font-family: var(--mono);
    font-size: 10px;
    font-weight: 600;
    padding: 4px 8px;
    border-radius: 6px;
    text-transform: uppercase;
    letter-spacing: 0.1em;
  }

  /* Summary stats row */
  .summary-row {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(170px, 1fr));
    gap: 12px;
    margin-bottom: 36px;
    padding: 24px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    position: relative;
    overflow: hidden;
  }

  .summary-row::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent 0%, var(--amber) 50%, transparent 100%);
    opacity: 0.4;
  }

  .summary-stat {
    border-right: 1px solid var(--border);
    padding-right: 16px;
  }

  .summary-stat:last-child { border-right: none; }

  .summary-stat .label {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.12em;
    margin-bottom: 6px;
  }

  .summary-stat .value {
    font-family: var(--mono);
    font-size: 28px;
    font-weight: 500;
    color: var(--text);
    letter-spacing: -0.02em;
  }

  .summary-stat .value.accent { color: var(--amber); }

  /* Campaigns grid */
  .campaigns-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(420px, 1fr));
    gap: 20px;
  }

  .campaign-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 24px;
    transition: all 0.25s ease;
    position: relative;
    overflow: hidden;
  }

  .campaign-card:hover {
    background: var(--card-hover);
    border-color: var(--border-strong);
    transform: translateY(-2px);
  }

  .campaign-header {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 12px;
    margin-bottom: 20px;
    padding-bottom: 16px;
    border-bottom: 1px solid var(--border);
  }

  .campaign-title {
    font-family: var(--sans);
    font-size: 16px;
    font-weight: 600;
    color: var(--text);
    line-height: 1.3;
    letter-spacing: -0.01em;
  }

  .campaign-tag {
    font-family: var(--mono);
    font-size: 10px;
    font-weight: 600;
    color: var(--cyan);
    background: var(--cyan-bg);
    padding: 4px 8px;
    border-radius: 6px;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    white-space: nowrap;
    flex-shrink: 0;
  }

  .campaign-tag.tag-prev { color: var(--cyan); background: var(--cyan-bg); }
  .campaign-tag.tag-novator { color: #a78bfa; background: rgba(167, 139, 250, 0.1); }
  .campaign-tag.tag-radiix { color: var(--amber); background: var(--amber-bg); }

  /* Hero metrics */
  .hero-metrics {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
    margin-bottom: 20px;
  }

  .hero-metric {
    padding: 16px;
    background: rgba(0, 0, 0, 0.2);
    border: 1px solid var(--border);
    border-radius: 12px;
  }

  .hero-metric.highlight {
    border-color: rgba(251, 191, 36, 0.3);
    background: linear-gradient(135deg, var(--amber-bg) 0%, rgba(0,0,0,0.2) 100%);
  }

  .hero-metric .label {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.12em;
    margin-bottom: 8px;
  }

  .hero-metric .value {
    font-family: var(--mono);
    font-size: 28px;
    font-weight: 500;
    letter-spacing: -0.02em;
    line-height: 1;
  }

  .hero-metric.highlight .value { color: var(--amber); }

  .hero-metric .delta {
    margin-top: 6px;
    font-family: var(--mono);
    font-size: 11px;
  }

  /* Metrics grid */
  .metrics-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 12px;
  }

  .metric {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    padding: 8px 0;
    border-bottom: 1px solid var(--border);
  }

  .metric:nth-last-child(-n+2) { border-bottom: none; }

  .metric .label {
    font-family: var(--sans);
    font-size: 12px;
    color: var(--text-muted);
  }

  .metric .value-block {
    display: flex;
    align-items: baseline;
    gap: 6px;
  }

  .metric .value {
    font-family: var(--mono);
    font-size: 14px;
    color: var(--text);
    font-weight: 500;
  }

  .metric .delta {
    font-family: var(--mono);
    font-size: 11px;
  }

  .delta.positive { color: var(--green); }
  .delta.negative { color: var(--red); }
  .delta.neutral { color: var(--text-dim); }

  /* Empty state */
  .empty-state {
    text-align: center;
    padding: 80px 20px;
    background: var(--card);
    border: 1px dashed var(--border-strong);
    border-radius: 16px;
  }

  .empty-state h3 {
    font-family: var(--serif);
    font-size: 32px;
    font-weight: 400;
    font-style: italic;
    color: var(--text);
    margin-bottom: 8px;
  }

  .empty-state p {
    color: var(--text-muted);
    margin-bottom: 24px;
  }

  .empty-state button {
    background: var(--amber);
    color: #1a1100;
    border: none;
    padding: 12px 24px;
    border-radius: 10px;
    font-family: var(--sans);
    font-weight: 600;
    font-size: 14px;
    cursor: pointer;
    transition: transform 0.2s;
  }

  .empty-state button:hover { transform: translateY(-1px); }

  /* Overall view */
  .overall-grid {
    display: grid;
    grid-template-columns: 1fr;
    gap: 24px;
  }

  .panel {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 28px;
  }

  .panel h3 {
    font-family: var(--serif);
    font-size: 26px;
    font-weight: 400;
    margin-bottom: 4px;
    letter-spacing: -0.01em;
  }

  .panel h3 em { font-style: italic; color: var(--amber); }

  .panel .panel-sub {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.12em;
    margin-bottom: 24px;
  }

  /* Campaign aggregate table */
  .agg-table {
    width: 100%;
    border-collapse: collapse;
  }

  .agg-table th {
    text-align: left;
    font-family: var(--mono);
    font-size: 10px;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.12em;
    padding: 12px 16px;
    border-bottom: 1px solid var(--border);
    font-weight: 500;
  }

  .agg-table th.num { text-align: right; }

  .agg-table td {
    padding: 14px 16px;
    border-bottom: 1px solid var(--border);
    font-family: var(--sans);
    font-size: 14px;
  }

  .agg-table td.num {
    text-align: right;
    font-family: var(--mono);
    font-weight: 500;
  }

  .agg-table tr:last-child td { border-bottom: none; }

  .agg-table tr:hover { background: rgba(255, 255, 255, 0.02); }

  .rfq-cell { color: var(--amber); font-weight: 600; }
  .rate-cell { color: var(--green); }

  /* Manage view */
  .manage-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 24px;
  }

  @media (max-width: 900px) {
    .manage-grid { grid-template-columns: 1fr; }
  }

  .input-panel, .output-panel {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 28px;
  }

  .input-panel label {
    display: block;
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.12em;
    margin-bottom: 8px;
  }

  .input-panel input[type="date"], .input-panel input[type="text"] {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 14px;
    color: var(--text);
    font-family: var(--mono);
    font-size: 14px;
    margin-bottom: 18px;
    outline: none;
    transition: border-color 0.2s;
  }

  .input-panel input:focus { border-color: var(--amber); }

  .input-panel textarea {
    width: 100%;
    min-height: 320px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 14px;
    color: var(--text);
    font-family: var(--mono);
    font-size: 13px;
    line-height: 1.6;
    resize: vertical;
    outline: none;
    transition: border-color 0.2s;
  }

  .input-panel textarea:focus { border-color: var(--amber); }

  .button-row {
    display: flex;
    gap: 10px;
    margin-top: 18px;
    flex-wrap: wrap;
  }

  button.primary {
    background: var(--amber);
    color: #1a1100;
    border: none;
    padding: 11px 22px;
    border-radius: 10px;
    font-family: var(--sans);
    font-weight: 600;
    font-size: 14px;
    cursor: pointer;
    transition: transform 0.2s;
  }

  button.primary:hover { transform: translateY(-1px); }

  button.secondary {
    background: var(--border-strong);
    color: var(--text);
    border: 1px solid var(--border-strong);
    padding: 11px 22px;
    border-radius: 10px;
    font-family: var(--sans);
    font-weight: 500;
    font-size: 14px;
    cursor: pointer;
    transition: background 0.2s;
  }

  button.secondary:hover { background: #364567; }

  button.ghost {
    background: transparent;
    color: var(--text-muted);
    border: 1px solid var(--border);
    padding: 11px 22px;
    border-radius: 10px;
    font-family: var(--sans);
    font-weight: 500;
    font-size: 14px;
    cursor: pointer;
    transition: all 0.2s;
  }

  button.ghost:hover {
    color: var(--text);
    border-color: var(--border-strong);
  }

  button.danger {
    background: transparent;
    color: var(--red);
    border: 1px solid rgba(248, 113, 113, 0.3);
    padding: 11px 22px;
    border-radius: 10px;
    font-family: var(--sans);
    font-weight: 500;
    font-size: 14px;
    cursor: pointer;
    transition: all 0.2s;
  }

  button.danger:hover { background: var(--red-bg); }

  .output-panel pre {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 16px;
    font-family: var(--mono);
    font-size: 12px;
    color: var(--text);
    overflow: auto;
    max-height: 460px;
    line-height: 1.5;
  }

  .help-note {
    margin-top: 20px;
    padding: 16px;
    background: var(--cyan-bg);
    border: 1px solid rgba(34, 211, 238, 0.2);
    border-radius: 10px;
    font-size: 13px;
    color: var(--text-muted);
  }

  .help-note strong { color: var(--cyan); }

  .help-note ol { padding-left: 20px; margin-top: 8px; }
  .help-note li { margin-bottom: 6px; }
  .help-note code {
    font-family: var(--mono);
    background: rgba(0, 0, 0, 0.3);
    padding: 1px 6px;
    border-radius: 4px;
    font-size: 12px;
  }

  .toast {
    position: fixed;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%) translateY(100px);
    background: var(--card);
    border: 1px solid var(--border-strong);
    color: var(--text);
    padding: 14px 24px;
    border-radius: 12px;
    font-family: var(--sans);
    font-size: 14px;
    box-shadow: 0 12px 40px rgba(0,0,0,0.4);
    transition: transform 0.3s ease;
    z-index: 100;
  }

  .toast.show { transform: translateX(-50%) translateY(0); }
  .toast.success { border-color: var(--green); }
  .toast.error { border-color: var(--red); }

  /* Footer */
  footer {
    margin-top: 80px;
    padding-top: 28px;
    border-top: 1px solid var(--border);
    text-align: center;
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.15em;
  }

  /* Animation */
  .view { animation: fadeIn 0.3s ease; }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @media (max-width: 700px) {
    .container { padding: 20px 16px 80px; }
    .page-intro h2 { font-size: 38px; }
    .campaigns-grid { grid-template-columns: 1fr; }
    .hero-metrics { grid-template-columns: 1fr; }
    .agg-table { font-size: 12px; }
    .agg-table td, .agg-table th { padding: 10px 8px; }
  }
</style>
</head>

<script>
/* ---------------------------------------------------------
   STATE
--------------------------------------------------------- */
const state = {
  data: { lastUpdated: '', reports: [] },
  view: 'daily',
  currentDate: null,
  parsedPreview: null
};

/* ---------------------------------------------------------
   METRIC DEFINITIONS
--------------------------------------------------------- */
const METRICS = [
  { key: 'contacts',         label: 'Contacts',           aliases: ['contacts'] },
  { key: 'notAddedToSequence', label: 'Not Added',        aliases: ['not added to sequence', 'not added'] },
  { key: 'inbox',            label: 'Inbox',              aliases: ['inbox'] },
  { key: 'sent',             label: 'Sent',               aliases: ['sent'] },
  { key: 'delivered',        label: 'Delivered',          aliases: ['delivered'] },
  { key: 'bounced',          label: 'Bounced',            aliases: ['bounced'] },
  { key: 'spamBlocked',      label: 'Spam Blocked',       aliases: ['spam blocked', 'spam'] },
  { key: 'badData',          label: 'Bad Data',           aliases: ['bad data'] },
  { key: 'replies',          label: 'Replies',            aliases: ['replies'] },
  { key: 'replyRate',        label: 'Reply Rate',         aliases: ['reply rate'], isPercent: true },
  { key: 'rfqReceived',      label: 'RFQ Received',       aliases: ['rfq received', 'rfq'] }
];

const aliasMap = {};
METRICS.forEach(m => m.aliases.forEach(a => aliasMap[a.toLowerCase()] = m.key));

/* ---------------------------------------------------------
   DATA LOADING
--------------------------------------------------------- */
function loadData() {
  const json = window.appData;

  if (!json) {
    showLoadError('data.js did not load. Make sure data.js is in the same folder as index.html.');
  }
  // Canonical shape { reports: [...] }
  else if (Array.isArray(json.reports)) {
    state.data = json;
  }
  // Auto-wrap single report
  else if (Array.isArray(json.campaigns) && typeof json.date === 'string') {
    state.data = { lastUpdated: new Date().toISOString(), reports: [json] };
  }
  // Auto-wrap bare array
  else if (Array.isArray(json) && json.every(r => r && Array.isArray(r.campaigns))) {
    state.data = { lastUpdated: new Date().toISOString(), reports: json };
  }
  else {
    showLoadError('data.js structure is wrong. Must be: window.appData = { "reports": [ { "date": "...", "campaigns": [...] } ] };');
  }

  if (state.data.reports.length) {
    state.currentDate = state.data.reports[0].date;
  }
  updateLastUpdated();
  render();
}

function showLoadError(msg) {
  // Render a persistent banner above the main view
  const existing = document.getElementById('loadError');
  if (existing) existing.remove();
  const banner = document.createElement('div');
  banner.id = 'loadError';
  banner.style.cssText = 'background:rgba(248,113,113,0.1);border:1px solid rgba(248,113,113,0.3);color:#f87171;padding:14px 18px;border-radius:10px;margin-bottom:24px;font-size:14px;';
  banner.textContent = '⚠ ' + msg;
  const main = document.getElementById('main');
  if (main && main.parentNode) main.parentNode.insertBefore(banner, main);
}

function updateLastUpdated() {
  const el = document.getElementById('lastUpdated');
  if (state.data.lastUpdated) {
    const d = new Date(state.data.lastUpdated);
    el.textContent = d.toLocaleString('en-GB', { dateStyle: 'medium', timeStyle: 'short' });
  } else {
    el.textContent = 'never';
  }
}

/* ---------------------------------------------------------
   PARSER
--------------------------------------------------------- */
function parseReport(text) {
  // Normalize whitespace and split into campaign blocks.
  // Each block starts with "Email outreach"
  const normalized = text.replace(/\r\n/g, '\n').trim();
  const blocks = normalized.split(/(?=Email outreach)/g)
    .map(b => b.trim())
    .filter(b => b.length > 0);

  const campaigns = [];

  for (const block of blocks) {
    // Header is first line up to where metrics start.
    // Find first "Contacts:" or any metric marker.
    const headerEndIdx = block.search(/\n?\s*(Contacts|Inbox|Sent|Delivered|Bounced|Spam|Replies|Not added)\s*:/i);
    if (headerEndIdx < 0) continue;

    const headerRaw = block.slice(0, headerEndIdx).trim();
    const rest = block.slice(headerEndIdx);

    // Parse header: "Email outreach [-TAG- | - TAG -] Name [- subname] - time, date"
    let cleanHeader = headerRaw.replace(/^Email outreach\s*/i, '').trim();
    // Remove trailing time pattern like "- 10am, May 1" or "10am, May 1"
    cleanHeader = cleanHeader.replace(/\s*-?\s*\d{1,2}(:\d{2})?\s*(am|pm)?\s*,\s*[A-Za-z]+\s+\d+.*$/i, '').trim();

    // Try to extract tag (PREV, NOVA TOR, RADII-X, etc.)
    let tag = '';
    let name = cleanHeader;

    // Pattern: "-TAG- Name" or "- TAG - Name"
    // Greedy match anchored on alphanumeric end so RADII-X, NOVA TOR, PREV all work.
    const tagMatch = cleanHeader.match(/^-?\s*([A-Z](?:[A-Z0-9\s\-]*[A-Z0-9])?)\s*-\s+(.+)$/);
    if (tagMatch) {
      tag = tagMatch[1].trim();
      name = tagMatch[2].trim();
    }

    // Parse metrics
    const metrics = {};
    const metricLines = rest.split('\n').map(l => l.trim()).filter(l => l);

    for (const line of metricLines) {
      // "MetricName: VALUE (DELTA)" or "MetricName: VALUE% (+DELTA%)"
      // Also handle "VALUE (+DELTA) (Step 2)" extra parentheses
      const m = line.match(/^([A-Za-z][A-Za-z\s]+?)\s*:\s*([\d.]+)(%?)\s*(?:\(([^)]*)\))?/);
      if (!m) continue;

      const rawKey = m[1].trim().toLowerCase();
      const key = aliasMap[rawKey];
      if (!key) continue;

      const value = parseFloat(m[2]);
      let delta = 0;
      if (m[4]) {
        const deltaMatch = m[4].match(/([+-]?[\d.]+)/);
        if (deltaMatch) delta = parseFloat(deltaMatch[1]);
      }

      metrics[key] = { value, delta };
    }

    if (Object.keys(metrics).length > 0) {
      campaigns.push({ name, tag, metrics });
    }
  }

  return campaigns;
}

/* ---------------------------------------------------------
   RENDER ROUTER
--------------------------------------------------------- */
function render() {
  const main = document.getElementById('main');
  document.querySelectorAll('nav.tabs button').forEach(b => {
    b.classList.toggle('active', b.dataset.view === state.view);
  });

  if (state.view === 'daily') main.innerHTML = renderDaily();
  else if (state.view === 'overall') main.innerHTML = renderOverall();
  else if (state.view === 'manage') main.innerHTML = renderManage();

  attachHandlers();
}

/* ---------------------------------------------------------
   DAILY VIEW
--------------------------------------------------------- */
function renderDaily() {
  if (!state.data.reports.length) {
    return `<div class="view">
      <div class="empty-state">
        <h3>No reports yet</h3>
        <p>Add your first report from the Manage tab to get started.</p>
        <button onclick="setView('manage')">Add report</button>
      </div>
    </div>`;
  }

  const report = state.data.reports.find(r => r.date === state.currentDate) || state.data.reports[0];
  state.currentDate = report.date;

  const dateObj = new Date(report.date);
  const dateStr = dateObj.toLocaleDateString('en-GB', { day: 'numeric', month: 'long', year: 'numeric' });

  // Date options
  const dateOptions = state.data.reports.map(r => {
    const d = new Date(r.date);
    const label = d.toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' });
    return `<option value="${r.date}" ${r.date === state.currentDate ? 'selected' : ''}>${label}</option>`;
  }).join('');

  // Summary totals
  const totals = aggregateMetrics(report.campaigns);

  // Campaigns
  const campaignCards = report.campaigns.map(renderCampaignCard).join('');

  return `<div class="view">
    <div class="page-intro">
      <div>
        <h2>Report for <em>${dateStr}</em></h2>
        <div class="subtitle">${report.campaigns.length} campaign${report.campaigns.length !== 1 ? 's' : ''} · ${report.time || ''}</div>
      </div>
      <div class="date-selector">
        <span class="badge">Date</span>
        <select id="dateSelect">${dateOptions}</select>
      </div>
    </div>

    <div class="summary-row">
      <div class="summary-stat">
        <div class="label">Contacts</div>
        <div class="value">${totals.contacts}</div>
      </div>
      <div class="summary-stat">
        <div class="label">Sent</div>
        <div class="value">${totals.sent}</div>
      </div>
      <div class="summary-stat">
        <div class="label">Delivered</div>
        <div class="value">${totals.delivered}</div>
      </div>
      <div class="summary-stat">
        <div class="label">Replies</div>
        <div class="value">${totals.replies}</div>
      </div>
      <div class="summary-stat">
        <div class="label">Reply rate</div>
        <div class="value">${totals.replyRate}%</div>
      </div>
      <div class="summary-stat">
        <div class="label">RFQs</div>
        <div class="value accent">${totals.rfqReceived}</div>
      </div>
    </div>

    <div class="campaigns-grid">
      ${campaignCards}
    </div>
  </div>`;
}

function renderCampaignCard(c) {
  const m = c.metrics;
  const tagClass = c.tag ? `tag-${c.tag.toLowerCase().replace(/[^a-z]/g, '')}` : '';
  const replyRate = m.replyRate ? m.replyRate.value : 0;
  const replyRateDelta = m.replyRate ? m.replyRate.delta : 0;
  const rfq = m.rfqReceived ? m.rfqReceived.value : 0;
  const rfqDelta = m.rfqReceived ? m.rfqReceived.delta : 0;

  const detailKeys = ['contacts','sent','delivered','inbox','bounced','spamBlocked','badData','notAddedToSequence','replies'];
  const detailHtml = detailKeys
    .filter(k => m[k])
    .map(k => {
      const metric = METRICS.find(x => x.key === k);
      return `<div class="metric">
        <span class="label">${metric.label}</span>
        <span class="value-block">
          <span class="value">${m[k].value}</span>
          ${deltaHtml(m[k].delta)}
        </span>
      </div>`;
    }).join('');

  return `<div class="campaign-card">
    <div class="campaign-header">
      <div class="campaign-title">${escapeHtml(c.name)}</div>
      ${c.tag ? `<span class="campaign-tag ${tagClass}">${escapeHtml(c.tag)}</span>` : ''}
    </div>
    <div class="hero-metrics">
      <div class="hero-metric">
        <div class="label">Reply Rate</div>
        <div class="value">${replyRate}<span style="font-size:18px;color:var(--text-dim)">%</span></div>
        ${deltaHtml(replyRateDelta, '%')}
      </div>
      <div class="hero-metric highlight">
        <div class="label">RFQ Received</div>
        <div class="value">${rfq}</div>
        ${deltaHtml(rfqDelta)}
      </div>
    </div>
    <div class="metrics-grid">
      ${detailHtml}
    </div>
  </div>`;
}

function deltaHtml(delta, suffix = '') {
  if (delta === 0 || delta === undefined || delta === null) return `<span class="delta neutral">±0${suffix}</span>`;
  const cls = delta > 0 ? 'positive' : 'negative';
  const sign = delta > 0 ? '+' : '';
  return `<span class="delta ${cls}">${sign}${delta}${suffix}</span>`;
}

function aggregateMetrics(campaigns) {
  const totals = { contacts: 0, sent: 0, delivered: 0, replies: 0, rfqReceived: 0, replyRate: 0 };
  campaigns.forEach(c => {
    Object.keys(totals).forEach(k => {
      if (c.metrics[k]) totals[k] += c.metrics[k].value;
    });
  });
  totals.replyRate = totals.sent > 0 ? Math.round((totals.replies / totals.sent) * 1000) / 10 : 0;
  return totals;
}

/* ---------------------------------------------------------
   OVERALL VIEW
--------------------------------------------------------- */
function renderOverall() {
  if (!state.data.reports.length) {
    return `<div class="view">
      <div class="empty-state">
        <h3>No data yet</h3>
        <p>Statistics will appear here once you add reports.</p>
      </div>
    </div>`;
  }

  // Aggregate everything
  const allCampaigns = {};
  let totalReports = state.data.reports.length;
  let totals = { contacts: 0, sent: 0, delivered: 0, replies: 0, rfqReceived: 0, bounced: 0 };

  state.data.reports.forEach(r => {
    r.campaigns.forEach(c => {
      const key = `${c.tag}|${c.name}`;
      if (!allCampaigns[key]) {
        allCampaigns[key] = { name: c.name, tag: c.tag, reportCount: 0, totals: { contacts: 0, sent: 0, delivered: 0, replies: 0, rfqReceived: 0 } };
      }
      allCampaigns[key].reportCount++;
      Object.keys(allCampaigns[key].totals).forEach(k => {
        if (c.metrics[k]) allCampaigns[key].totals[k] += c.metrics[k].value;
      });
      Object.keys(totals).forEach(k => {
        if (c.metrics[k]) totals[k] += c.metrics[k].value;
      });
    });
  });

  const aggList = Object.values(allCampaigns).sort((a, b) => b.totals.rfqReceived - a.totals.rfqReceived);
  const overallReplyRate = totals.sent ? ((totals.replies / totals.sent) * 100).toFixed(1) : '0.0';

  const dates = state.data.reports.map(r => r.date).sort();
  const dateRange = `${formatDate(dates[0])} → ${formatDate(dates[dates.length - 1])}`;

  return `<div class="view">
    <div class="page-intro">
      <div>
        <h2>Overall <em>statistics</em></h2>
        <div class="subtitle">${totalReports} report${totalReports !== 1 ? 's' : ''} · ${dateRange}</div>
      </div>
    </div>

    <div class="summary-row">
      <div class="summary-stat">
        <div class="label">Total contacts</div>
        <div class="value">${totals.contacts}</div>
      </div>
      <div class="summary-stat">
        <div class="label">Total sent</div>
        <div class="value">${totals.sent}</div>
      </div>
      <div class="summary-stat">
        <div class="label">Delivered</div>
        <div class="value">${totals.delivered}</div>
      </div>
      <div class="summary-stat">
        <div class="label">Replies</div>
        <div class="value">${totals.replies}</div>
      </div>
      <div class="summary-stat">
        <div class="label">Reply rate</div>
        <div class="value">${overallReplyRate}%</div>
      </div>
      <div class="summary-stat">
        <div class="label">Total RFQs</div>
        <div class="value accent">${totals.rfqReceived}</div>
      </div>
    </div>

    <div class="panel">
      <h3>By <em>campaign</em></h3>
      <div class="panel-sub">Aggregated across all reports</div>
      <table class="agg-table">
        <thead>
          <tr>
            <th>Campaign</th>
            <th>Tag</th>
            <th class="num">Reports</th>
            <th class="num">Sent</th>
            <th class="num">Delivered</th>
            <th class="num">Replies</th>
            <th class="num">Reply %</th>
            <th class="num">RFQs</th>
          </tr>
        </thead>
        <tbody>
          ${aggList.map(c => {
            const rate = c.totals.sent ? ((c.totals.replies / c.totals.sent) * 100).toFixed(1) : '0.0';
            return `<tr>
              <td>${escapeHtml(c.name)}</td>
              <td><span class="campaign-tag ${c.tag ? 'tag-' + c.tag.toLowerCase().replace(/[^a-z]/g,'') : ''}">${escapeHtml(c.tag || '—')}</span></td>
              <td class="num">${c.reportCount}</td>
              <td class="num">${c.totals.sent}</td>
              <td class="num">${c.totals.delivered}</td>
              <td class="num">${c.totals.replies}</td>
              <td class="num rate-cell">${rate}%</td>
              <td class="num rfq-cell">${c.totals.rfqReceived}</td>
            </tr>`;
          }).join('')}
        </tbody>
      </table>
    </div>
  </div>`;
}

function formatDate(iso) {
  if (!iso) return '';
  return new Date(iso).toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' });
}

/* ---------------------------------------------------------
   MANAGE VIEW
--------------------------------------------------------- */
function renderManage() {
  const today = new Date().toISOString().split('T')[0];
  const previewHtml = state.parsedPreview
    ? `<pre>${escapeHtml(JSON.stringify(state.parsedPreview, null, 2))}</pre>`
    : `<pre style="color:var(--text-dim)">Parsed JSON will appear here…</pre>`;

  return `<div class="view">
    <div class="page-intro">
      <div>
        <h2>Manage <em>reports</em></h2>
        <div class="subtitle">Paste a report → preview → export updated data.js</div>
      </div>
    </div>

    <div class="manage-grid">
      <div class="input-panel">
        <label>Report date</label>
        <input type="date" id="reportDate" value="${today}" />

        <label>Report time (optional)</label>
        <input type="text" id="reportTime" placeholder="e.g. 10am" />

        <label>Paste raw report text</label>
        <textarea id="reportText" placeholder="Email outreach - PREV - Mechanical Companies (Vancouver) - 10am, May 1
Contacts: 34 (+0)
Inbox: 34 (+0)
Sent: 34 (+0)
Delivered: 28 (+0)
..."></textarea>

        <div class="button-row">
          <button class="primary" id="parseBtn">Parse &amp; preview</button>
          <button class="secondary" id="saveBtn">Add to dataset</button>
          <button class="ghost" id="clearBtn">Clear</button>
        </div>

        <div class="help-note">
          <strong>Deploy workflow</strong>
          <ol>
            <li>Paste the report above and click <code>Parse &amp; preview</code></li>
            <li>Click <code>Add to dataset</code> — preview is now in memory</li>
            <li>Click <code>Download data.js</code> in the right panel</li>
            <li>Replace <code>data.js</code> in your folder / GitHub repo</li>
            <li>GitHub Pages rebuilds the site in ~30 seconds</li>
          </ol>
        </div>
      </div>

      <div class="output-panel">
        <label style="display:block;font-family:var(--mono);font-size:11px;color:var(--amber);text-transform:uppercase;letter-spacing:0.12em;margin-bottom:6px">⬇ This is your data.js — copy this one</label>
        <div style="font-size:12px;color:var(--text-muted);margin-bottom:12px;line-height:1.5">Press <code style="font-family:var(--mono);background:rgba(0,0,0,0.3);padding:1px 6px;border-radius:4px">Add to dataset</code> on the left first, then copy from here.</div>
        <pre id="jsonOutput">${escapeHtml('window.appData = ' + JSON.stringify(state.data, null, 2) + ';')}</pre>

        <div class="button-row">
          <button class="primary" id="downloadBtn">Download data.js</button>
          <button class="secondary" id="copyBtn">Copy to clipboard</button>
          <button class="danger" id="resetBtn">Reset all data</button>
        </div>

        ${state.parsedPreview ? `
        <div style="margin-top:24px">
          <label style="display:block;font-family:var(--mono);font-size:11px;color:var(--text-dim);text-transform:uppercase;letter-spacing:0.12em;margin-bottom:12px">Parsed preview</label>
          ${previewHtml}
        </div>` : ''}
      </div>
    </div>
  </div>`;
}

/* ---------------------------------------------------------
   EVENT HANDLERS
--------------------------------------------------------- */
function attachHandlers() {
  document.querySelectorAll('nav.tabs button').forEach(b => {
    b.onclick = () => setView(b.dataset.view);
  });

  const dateSelect = document.getElementById('dateSelect');
  if (dateSelect) {
    dateSelect.onchange = (e) => {
      state.currentDate = e.target.value;
      render();
    };
  }

  const parseBtn = document.getElementById('parseBtn');
  if (parseBtn) {
    parseBtn.onclick = () => {
      const text = document.getElementById('reportText').value;
      if (!text.trim()) {
        toast('Please paste a report first', 'error');
        return;
      }
      try {
        const campaigns = parseReport(text);
        if (!campaigns.length) {
          toast('Could not parse any campaigns. Check the format.', 'error');
          return;
        }
        const date = document.getElementById('reportDate').value;
        const time = document.getElementById('reportTime').value;
        state.parsedPreview = { date, time, campaigns };
        toast(`Parsed ${campaigns.length} campaign${campaigns.length !== 1 ? 's' : ''}`, 'success');
        render();
      } catch (e) {
        toast('Parser error: ' + e.message, 'error');
      }
    };
  }

  const saveBtn = document.getElementById('saveBtn');
  if (saveBtn) {
    saveBtn.onclick = () => {
      if (!state.parsedPreview) {
        toast('Parse a report first', 'error');
        return;
      }
      // Replace existing report for same date, else add and sort desc
      const idx = state.data.reports.findIndex(r => r.date === state.parsedPreview.date);
      if (idx >= 0) {
        state.data.reports[idx] = state.parsedPreview;
        toast('Existing report for that date was replaced', 'success');
      } else {
        state.data.reports.push(state.parsedPreview);
        toast('Report added to dataset', 'success');
      }
      state.data.reports.sort((a, b) => b.date.localeCompare(a.date));
      state.data.lastUpdated = new Date().toISOString();
      state.parsedPreview = null;
      state.currentDate = state.data.reports[0].date;
      updateLastUpdated();
      render();
    };
  }

  const clearBtn = document.getElementById('clearBtn');
  if (clearBtn) {
    clearBtn.onclick = () => {
      document.getElementById('reportText').value = '';
      state.parsedPreview = null;
      render();
    };
  }

  const downloadBtn = document.getElementById('downloadBtn');
  if (downloadBtn) {
    downloadBtn.onclick = () => {
      const content = 'window.appData = ' + JSON.stringify(state.data, null, 2) + ';\n';
      const blob = new Blob([content], { type: 'application/javascript' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = 'data.js';
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
      toast('data.js downloaded', 'success');
    };
  }

  const copyBtn = document.getElementById('copyBtn');
  if (copyBtn) {
    copyBtn.onclick = async () => {
      try {
        const content = 'window.appData = ' + JSON.stringify(state.data, null, 2) + ';';
        await navigator.clipboard.writeText(content);
        toast('Copied to clipboard', 'success');
      } catch {
        toast('Copy failed', 'error');
      }
    };
  }

  const resetBtn = document.getElementById('resetBtn');
  if (resetBtn) {
    resetBtn.onclick = () => {
      if (!confirm('Erase all reports in memory? Reload the page to restore from data.js.')) return;
      state.data = { lastUpdated: '', reports: [] };
      state.currentDate = null;
      state.parsedPreview = null;
      updateLastUpdated();
      render();
    };
  }
}

function setView(view) {
  state.view = view;
  render();
}

/* ---------------------------------------------------------
   UTILS
--------------------------------------------------------- */
function escapeHtml(s) {
  if (s === null || s === undefined) return '';
  return String(s)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}

let toastTimer = null;
function toast(msg, type = 'success') {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'toast show ' + type;
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => { el.className = 'toast'; }, 2800);
}

/* ---------------------------------------------------------
   START
--------------------------------------------------------- */
loadData();
</script>
