<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Outreach Reports</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><circle cx='50' cy='50' r='38' fill='none' stroke='%23f59e0b' stroke-width='18'/></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:wght@400;500;600&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f7f8fa;
    --bg-grad: radial-gradient(ellipse 90% 50% at 50% -20%, #fff4dc 0%, #f7f8fa 55%);
    --card: #ffffff;
    --card-hover: #fafbfc;
    --border: #e5e7eb;
    --border-strong: #cbd5e1;
    --text: #0f172a;
    --text-muted: #475569;
    --text-dim: #94a3b8;
    --green: #16a34a;
    --green-bg: rgba(22, 163, 74, 0.08);
    --red: #dc2626;
    --red-bg: rgba(220, 38, 38, 0.08);
    --amber: #d97706;
    --amber-bg: rgba(217, 119, 6, 0.1);
    --cyan: #0891b2;
    --cyan-bg: rgba(8, 145, 178, 0.08);
    --linkedin: #1d4ed8;
    --linkedin-bg: rgba(29, 78, 216, 0.08);
    --shadow-sm: 0 1px 2px rgba(15, 23, 42, 0.04), 0 1px 3px rgba(15, 23, 42, 0.06);
    --shadow-md: 0 4px 12px rgba(15, 23, 42, 0.06), 0 2px 6px rgba(15, 23, 42, 0.04);
    --serif: 'Instrument Serif', Georgia, serif;
    --sans: 'Plus Jakarta Sans', system-ui, sans-serif;
    --mono: 'JetBrains Mono', 'SF Mono', monospace;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { background: var(--bg); background-image: var(--bg-grad); background-attachment: fixed; color: var(--text); font-family: var(--sans); font-size: 15px; line-height: 1.55; min-height: 100vh; -webkit-font-smoothing: antialiased; }
  .container { max-width: 1280px; margin: 0 auto; padding: 32px 28px 120px; }

  header { display: flex; align-items: center; justify-content: space-between; padding-bottom: 32px; border-bottom: 1px solid var(--border); margin-bottom: 40px; flex-wrap: wrap; gap: 20px; }
  .logo { display: flex; align-items: center; gap: 14px; }
  .logo-mark { width: 48px; height: 48px; border-radius: 50%; background: conic-gradient(from 90deg, #fbbf24, #f97316, #fcd34d, #f59e0b, #fbbf24); -webkit-mask: radial-gradient(circle, transparent 36%, #000 40%); mask: radial-gradient(circle, transparent 36%, #000 40%); filter: drop-shadow(0 4px 12px rgba(217, 119, 6, 0.2)); }
  .logo-text h1 { font-family: var(--serif); font-size: 28px; font-weight: 400; letter-spacing: -0.02em; line-height: 1; }
  .logo-text h1 em { font-style: normal; color: var(--amber); }
  .logo-text p { font-family: var(--mono); font-size: 11px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.12em; margin-top: 4px; }

  nav.tabs { display: flex; gap: 4px; padding: 4px; background: var(--card); border: 1px solid var(--border); border-radius: 12px; box-shadow: var(--shadow-sm); }
  nav.tabs button { background: transparent; border: none; color: var(--text-muted); font-family: var(--sans); font-size: 14px; font-weight: 500; padding: 9px 18px; border-radius: 8px; cursor: pointer; transition: all 0.2s; }
  nav.tabs button:hover { color: var(--text); background: #f1f5f9; }
  nav.tabs button.active { background: var(--text); color: #fff; }

  .page-intro { display: flex; align-items: flex-end; justify-content: space-between; margin-bottom: 32px; flex-wrap: wrap; gap: 20px; }
  .page-intro h2 { font-family: var(--serif); font-size: 56px; font-weight: 400; letter-spacing: -0.03em; line-height: 1; }
  .page-intro h2 em { font-style: normal; color: var(--amber); }
  .page-intro .subtitle { font-family: var(--mono); color: var(--text-dim); font-size: 12px; text-transform: uppercase; letter-spacing: 0.15em; margin-top: 12px; }

  .date-picker { display: flex; flex-direction: column; gap: 6px; align-items: flex-end; }
  .date-picker label { font-family: var(--mono); font-size: 10px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.12em; }
  .date-picker input { background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 10px 14px; color: var(--text); font-family: var(--mono); font-size: 14px; outline: none; cursor: pointer; transition: all 0.2s; box-shadow: var(--shadow-sm); }
  .date-picker input:hover, .date-picker input:focus { border-color: var(--amber); }

  .summary-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 12px; margin-bottom: 36px; padding: 24px; background: var(--card); border: 1px solid var(--border); border-radius: 16px; position: relative; overflow: hidden; box-shadow: var(--shadow-sm); }
  .summary-row::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px; background: linear-gradient(90deg, transparent 0%, var(--amber) 50%, transparent 100%); opacity: 0.6; }
  .summary-stat { border-right: 1px solid var(--border); padding-right: 16px; }
  .summary-stat:last-child { border-right: none; }
  .summary-stat .label { font-family: var(--mono); font-size: 10px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.12em; margin-bottom: 6px; }
  .summary-stat .value { font-family: var(--mono); font-size: 28px; font-weight: 500; color: var(--text); letter-spacing: -0.02em; }
  .summary-stat .value.accent { color: var(--amber); }
  .summary-stat .value.green { color: var(--green); }

  .stage-section { margin-bottom: 32px; }
  .stage-header { display: flex; align-items: center; gap: 14px; margin-bottom: 16px; padding-bottom: 14px; border-bottom: 1px solid var(--border); }
  .stage-dot { width: 12px; height: 12px; border-radius: 50%; flex-shrink: 0; }
  .stage-dot.active { background: var(--green); box-shadow: 0 0 0 4px rgba(22, 163, 74, 0.15); }
  .stage-dot.followup { background: var(--amber); box-shadow: 0 0 0 4px rgba(217, 119, 6, 0.15); }
  .stage-dot.completed { background: var(--text-dim); }
  .stage-header h3 { font-family: var(--serif); font-size: 28px; font-weight: 400; letter-spacing: -0.01em; }
  .stage-header h3 em { font-style: normal; color: var(--text-dim); }
  .stage-header .count { font-family: var(--mono); font-size: 12px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.12em; margin-left: auto; }

  .campaigns-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(420px, 1fr)); gap: 20px; }

  .campaign-card { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 24px; transition: all 0.25s ease; position: relative; overflow: hidden; box-shadow: var(--shadow-sm); }
  .campaign-card:hover { box-shadow: var(--shadow-md); transform: translateY(-2px); }
  .campaign-card.stage-active { border-left: 3px solid var(--green); }
  .campaign-card.stage-followup { border-left: 3px solid var(--amber); }
  .campaign-card.stage-completed { border-left: 3px solid var(--text-dim); opacity: 0.92; }

  .campaign-header { display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; margin-bottom: 20px; padding-bottom: 16px; border-bottom: 1px solid var(--border); }
  .campaign-title { font-family: var(--sans); font-size: 16px; font-weight: 600; color: var(--text); line-height: 1.3; letter-spacing: -0.01em; }
  .campaign-tag { font-family: var(--mono); font-size: 10px; font-weight: 600; padding: 4px 8px; border-radius: 6px; text-transform: uppercase; letter-spacing: 0.1em; white-space: nowrap; flex-shrink: 0; color: var(--cyan); background: var(--cyan-bg); }
  .campaign-tag.tag-prev { color: var(--cyan); background: var(--cyan-bg); }
  .campaign-tag.tag-novator { color: #7c3aed; background: rgba(124, 58, 237, 0.08); }
  .campaign-tag.tag-radiix { color: var(--amber); background: var(--amber-bg); }
  .campaign-tag.type-linkedin { color: var(--linkedin); background: var(--linkedin-bg); }
  .campaign-tag.type-email { color: var(--text-muted); background: #f1f5f9; }

  .hero-metrics { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 20px; }
  .hero-metric { padding: 16px; background: #f9fafb; border: 1px solid var(--border); border-radius: 12px; }
  .hero-metric.highlight { border-color: rgba(217, 119, 6, 0.3); background: linear-gradient(135deg, #fef3c7 0%, #fffbeb 100%); }
  .hero-metric .label { font-family: var(--mono); font-size: 10px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.12em; margin-bottom: 8px; }
  .hero-metric .value { font-family: var(--mono); font-size: 28px; font-weight: 500; letter-spacing: -0.02em; line-height: 1; }
  .hero-metric.highlight .value { color: var(--amber); }
  .hero-metric .delta { margin-top: 6px; font-family: var(--mono); font-size: 11px; }

  .metrics-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
  .metric { display: flex; align-items: baseline; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid var(--border); }
  .metric:nth-last-child(-n+2) { border-bottom: none; }
  .metric .label { font-family: var(--sans); font-size: 12px; color: var(--text-muted); }
  .metric .value-block { display: flex; align-items: baseline; gap: 6px; }
  .metric .value { font-family: var(--mono); font-size: 14px; color: var(--text); font-weight: 500; }
  .metric .delta { font-family: var(--mono); font-size: 11px; }
  .delta.positive { color: var(--green); }
  .delta.negative { color: var(--red); }
  .delta.neutral { color: var(--text-dim); }

  .empty-state { text-align: center; padding: 80px 20px; background: var(--card); border: 1px dashed var(--border-strong); border-radius: 16px; box-shadow: var(--shadow-sm); }
  .empty-state h3 { font-family: var(--serif); font-size: 32px; font-weight: 400; color: var(--text); margin-bottom: 8px; }
  .empty-state p { color: var(--text-muted); margin-bottom: 24px; }
  .empty-state button { background: var(--amber); color: #fff; border: none; padding: 12px 24px; border-radius: 10px; font-family: var(--sans); font-weight: 600; font-size: 14px; cursor: pointer; }

  .panel { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 28px; margin-bottom: 24px; box-shadow: var(--shadow-sm); }
  .panel h3 { font-family: var(--serif); font-size: 26px; font-weight: 400; margin-bottom: 4px; letter-spacing: -0.01em; }
  .panel h3 em { font-style: normal; color: var(--amber); }
  .panel .panel-sub { font-family: var(--mono); font-size: 11px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.12em; margin-bottom: 24px; }

  .funnel { display: flex; flex-direction: column; gap: 8px; }
  .funnel-row { display: grid; grid-template-columns: 130px 1fr 90px 90px; gap: 14px; align-items: center; padding: 10px 0; }
  .funnel-label { font-family: var(--mono); font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.1em; }
  .funnel-bar-wrap { background: #f1f5f9; border-radius: 6px; height: 26px; overflow: hidden; position: relative; }
  .funnel-bar { height: 100%; background: linear-gradient(90deg, var(--cyan) 0%, var(--amber) 100%); border-radius: 6px; transition: width 0.5s ease; }
  .funnel-value { font-family: var(--mono); font-size: 14px; font-weight: 500; text-align: right; }
  .funnel-rate { font-family: var(--mono); font-size: 11px; color: var(--green); text-align: right; }

  .agg-table { width: 100%; border-collapse: collapse; }
  .agg-table th { text-align: left; font-family: var(--mono); font-size: 10px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.12em; padding: 12px 12px; border-bottom: 1px solid var(--border); font-weight: 500; }
  .agg-table th.num { text-align: right; }
  .agg-table td { padding: 14px 12px; border-bottom: 1px solid var(--border); font-family: var(--sans); font-size: 13px; }
  .agg-table td.num { text-align: right; font-family: var(--mono); font-weight: 500; }
  .agg-table tr:last-child td { border-bottom: none; }
  .agg-table tr:hover { background: #f9fafb; }
  .rfq-cell { color: var(--amber); font-weight: 600; }
  .rate-cell { color: var(--green); }

  .stage-bar-wrap { display: flex; height: 16px; border-radius: 8px; overflow: hidden; background: #f1f5f9; margin: 12px 0 20px; }
  .stage-bar-seg { height: 100%; display: flex; align-items: center; justify-content: center; font-family: var(--mono); font-size: 10px; font-weight: 600; color: #fff; transition: width 0.4s; }
  .stage-bar-seg.active { background: var(--green); }
  .stage-bar-seg.followup { background: var(--amber); }
  .stage-bar-seg.completed { background: #94a3b8; }
  .stage-legend { display: flex; gap: 20px; flex-wrap: wrap; font-family: var(--mono); font-size: 11px; color: var(--text-muted); }
  .stage-legend-item { display: flex; align-items: center; gap: 6px; }
  .stage-legend-item .dot { width: 10px; height: 10px; border-radius: 50%; }

  .editor-toolbar { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 20px; }
  .editor-card { background: var(--card); border: 1px solid var(--border); border-radius: 14px; padding: 18px; margin-bottom: 14px; transition: all 0.2s; box-shadow: var(--shadow-sm); }
  .editor-card:focus-within { border-color: var(--amber); box-shadow: var(--shadow-md); }
  .editor-card.stage-active { border-left: 3px solid var(--green); }
  .editor-card.stage-followup { border-left: 3px solid var(--amber); }
  .editor-card.stage-completed { border-left: 3px solid var(--text-dim); }
  .editor-header { display: grid; grid-template-columns: 1fr 110px 120px 130px auto; gap: 10px; align-items: center; margin-bottom: 14px; padding-bottom: 14px; border-bottom: 1px solid var(--border); }
  .editor-header input, .editor-header select { background: var(--bg); border: 1px solid var(--border); border-radius: 6px; padding: 8px 10px; color: var(--text); font-family: var(--sans); font-size: 13px; outline: none; transition: border-color 0.2s; }
  .editor-header input:focus, .editor-header select:focus { border-color: var(--amber); }
  .editor-header .name-input { font-weight: 600; font-size: 14px; }
  .editor-metrics { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 10px; }
  .editor-metric { display: flex; align-items: center; gap: 8px; padding: 6px 0; }
  .editor-metric .label { font-family: var(--mono); font-size: 11px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.08em; min-width: 95px; }
  .editor-metric input { flex: 1; min-width: 0; background: var(--bg); border: 1px solid var(--border); border-radius: 5px; padding: 5px 8px; color: var(--text); font-family: var(--mono); font-size: 12px; outline: none; }
  .editor-metric input:focus { border-color: var(--amber); }
  .editor-metric .delta-input { max-width: 56px; }

  button.primary { background: var(--amber); color: #fff; border: none; padding: 11px 22px; border-radius: 10px; font-family: var(--sans); font-weight: 600; font-size: 14px; cursor: pointer; transition: all 0.2s; box-shadow: 0 2px 4px rgba(217, 119, 6, 0.2); }
  button.primary:hover { transform: translateY(-1px); box-shadow: 0 4px 8px rgba(217, 119, 6, 0.25); }
  button.primary:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
  button.secondary { background: #e2e8f0; color: var(--text); border: 1px solid var(--border); padding: 11px 22px; border-radius: 10px; font-family: var(--sans); font-weight: 500; font-size: 14px; cursor: pointer; transition: background 0.2s; }
  button.secondary:hover { background: #cbd5e1; }
  button.ghost { background: transparent; color: var(--text-muted); border: 1px solid var(--border); padding: 11px 22px; border-radius: 10px; font-family: var(--sans); font-weight: 500; font-size: 14px; cursor: pointer; transition: all 0.2s; }
  button.ghost:hover { color: var(--text); border-color: var(--border-strong); background: #f9fafb; }
  button.danger { background: transparent; color: var(--red); border: 1px solid rgba(220, 38, 38, 0.3); padding: 8px 12px; border-radius: 8px; font-family: var(--sans); font-weight: 500; font-size: 12px; cursor: pointer; transition: all 0.2s; }
  button.danger:hover { background: var(--red-bg); }

  .settings-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-bottom: 18px; }
  @media (max-width: 700px) { .settings-grid { grid-template-columns: 1fr; } }
  .settings-grid label { display: block; font-family: var(--mono); font-size: 10px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.12em; margin-bottom: 6px; }
  .settings-grid input { width: 100%; background: var(--bg); border: 1px solid var(--border); border-radius: 8px; padding: 10px 12px; color: var(--text); font-family: var(--mono); font-size: 13px; outline: none; transition: border-color 0.2s; }
  .settings-grid input:focus { border-color: var(--amber); }

  .help-note { padding: 14px 16px; background: var(--cyan-bg); border: 1px solid rgba(8, 145, 178, 0.2); border-radius: 10px; font-size: 13px; color: var(--text-muted); line-height: 1.6; }
  .help-note strong { color: var(--cyan); }
  .help-note a { color: var(--cyan); }
  .help-note code { font-family: var(--mono); background: #fff; border: 1px solid var(--border); padding: 1px 6px; border-radius: 4px; font-size: 12px; }

  .paste-area { width: 100%; min-height: 140px; background: var(--bg); border: 1px solid var(--border); border-radius: 8px; padding: 12px; color: var(--text); font-family: var(--mono); font-size: 12px; line-height: 1.5; resize: vertical; outline: none; }
  .paste-area:focus { border-color: var(--amber); }

  .toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%) translateY(100px); background: var(--card); border: 1px solid var(--border-strong); color: var(--text); padding: 14px 24px; border-radius: 12px; font-family: var(--sans); font-size: 14px; box-shadow: 0 10px 30px rgba(15, 23, 42, 0.12); transition: transform 0.3s ease; z-index: 100; }
  .toast.show { transform: translateX(-50%) translateY(0); }
  .toast.success { border-color: var(--green); }
  .toast.error { border-color: var(--red); }

  .save-indicator { font-family: var(--mono); font-size: 11px; color: var(--text-dim); }
  .save-indicator.saved { color: var(--green); }
  .save-indicator.unsaved { color: var(--amber); }

  footer { margin-top: 80px; padding-top: 28px; border-top: 1px solid var(--border); text-align: center; font-family: var(--mono); font-size: 11px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.15em; }

  .view { animation: fadeIn 0.3s ease; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

  @media (max-width: 700px) {
    .container { padding: 20px 16px 80px; }
    .page-intro h2 { font-size: 38px; }
    .campaigns-grid { grid-template-columns: 1fr; }
    .hero-metrics { grid-template-columns: 1fr; }
    .editor-header { grid-template-columns: 1fr; }
    .funnel-row { grid-template-columns: 80px 1fr 60px; }
    .funnel-rate { display: none; }
  }
</style>
</head>
<body>
<div class="container">
  <header>
    <div class="logo">
      <div class="logo-mark"></div>
      <div class="logo-text">
        <h1>Outreach <em>Reports</em></h1>
        <p>Campaign performance tracker</p>
      </div>
    </div>
    <nav class="tabs">
      <button data-view="daily" class="active">Daily</button>
      <button data-view="overall">Overall</button>
      <button data-view="manage">Manage</button>
    </nav>
  </header>
  <script src="./data.js"></script>
  <main id="main"></main>
  <footer>
    Last sync · <span id="lastSync">never</span>
    &nbsp;·&nbsp; <span id="saveStatus" class="save-indicator">saved</span>
  </footer>
</div>
<div class="toast" id="toast"></div>

<script>
/* ============================================================
   CONSTANTS
============================================================ */
const STAGES = [
  { id: 'active',    label: 'Active',     sub: 'First-touch outreach in progress' },
  { id: 'followup',  label: 'Follow-ups', sub: 'Sending follow-up sequences' },
  { id: 'completed', label: 'Completed',  sub: 'Sequence finished' }
];

const CAMPAIGN_TYPES = [
  { id: 'email',    label: 'Email' },
  { id: 'linkedin', label: 'LinkedIn' }
];

const METRICS_BY_TYPE = {
  email: [
    { key: 'contacts',           label: 'Contacts' },
    { key: 'notAddedToSequence', label: 'Not Added' },
    { key: 'inbox',              label: 'Inbox' },
    { key: 'sent',               label: 'Sent' },
    { key: 'delivered',          label: 'Delivered' },
    { key: 'bounced',            label: 'Bounced' },
    { key: 'spamBlocked',        label: 'Spam Blocked' },
    { key: 'badData',            label: 'Bad Data' },
    { key: 'replies',            label: 'Replies' },
    { key: 'replyRate',          label: 'Reply Rate', suffix: '%' },
    { key: 'rfqReceived',        label: 'RFQ Received' }
  ],
  linkedin: [
    { key: 'inbox',              label: 'Inbox' },
    { key: 'connectionSent',     label: 'Connection Sent' },
    { key: 'connectAccepted',    label: 'Connect Accepted' },
    { key: 'acceptRate',         label: 'Accept Rate', suffix: '%' },
    { key: 'followed',           label: 'Followed' },
    { key: 'replies',            label: 'Replies' },
    { key: 'replyRate',          label: 'Reply Rate', suffix: '%' },
    { key: 'rfqReceived',        label: 'RFQ Received' }
  ]
};

// Union of all metric keys (used for lookups by key)
const METRICS = [
  { key: 'contacts',           label: 'Contacts' },
  { key: 'notAddedToSequence', label: 'Not Added' },
  { key: 'inbox',              label: 'Inbox' },
  { key: 'sent',               label: 'Sent' },
  { key: 'delivered',          label: 'Delivered' },
  { key: 'bounced',            label: 'Bounced' },
  { key: 'spamBlocked',        label: 'Spam Blocked' },
  { key: 'badData',            label: 'Bad Data' },
  { key: 'replies',            label: 'Replies' },
  { key: 'replyRate',          label: 'Reply Rate', suffix: '%' },
  { key: 'rfqReceived',        label: 'RFQ Received' },
  { key: 'connectionSent',     label: 'Connection Sent' },
  { key: 'connectAccepted',    label: 'Connect Accepted' },
  { key: 'acceptRate',         label: 'Accept Rate', suffix: '%' },
  { key: 'followed',           label: 'Followed' }
];

const ALIAS = {
  // email
  'contacts': 'contacts',
  'not added to sequence': 'notAddedToSequence', 'not added': 'notAddedToSequence',
  'inbox': 'inbox', 'sent': 'sent', 'delivered': 'delivered', 'bounced': 'bounced',
  'spam blocked': 'spamBlocked', 'spam': 'spamBlocked',
  'bad data': 'badData',
  'replies': 'replies', 'reply rate': 'replyRate',
  'rfq received': 'rfqReceived', 'rfq': 'rfqReceived',
  // linkedin
  'connection sent': 'connectionSent', 'connections sent': 'connectionSent',
  'connect accepted': 'connectAccepted', 'connection accepted': 'connectAccepted',
  'accept rate': 'acceptRate', 'acceptance rate': 'acceptRate',
  'followed': 'followed', 'follows': 'followed'
};

function getMetricsForType(type) {
  return METRICS_BY_TYPE[type] || METRICS_BY_TYPE.email;
}

const LS_KEY = 'outreachData_v2';
const LS_SETTINGS = 'outreachSettings_v2';

/* ============================================================
   STATE
============================================================ */
const state = {
  data: { lastUpdated: '', lastSync: '', reportDate: '', campaigns: [] },
  view: 'daily',
  ghToken: '',
  ghRepo: '',
  ghBranch: 'main',
  saveStatus: 'saved'
};

/* ============================================================
   LOAD & MIGRATE
============================================================ */
function ensureMetrics(c) {
  if (!c.id) c.id = uid();
  if (!c.stage) c.stage = 'active';
  if (typeof c.tag !== 'string') c.tag = '';
  if (!c.type) c.type = 'email'; // default for backward compat
  c.metrics = c.metrics || {};
  // Ensure all metrics relevant to this type exist
  getMetricsForType(c.type).forEach(x => {
    if (!c.metrics[x.key]) c.metrics[x.key] = { value: 0, delta: 0 };
  });
  return c;
}

function migrate(json) {
  if (!json) return { lastUpdated: '', lastSync: '', reportDate: '', campaigns: [] };
  if (Array.isArray(json.campaigns)) {
    return {
      lastUpdated: json.lastUpdated || '',
      lastSync: json.lastSync || '',
      reportDate: json.reportDate || '',
      campaigns: json.campaigns.map(ensureMetrics)
    };
  }
  // Old format: { reports: [{date, campaigns: [...]}] }
  if (Array.isArray(json.reports) && json.reports.length) {
    const latest = json.reports[0];
    return {
      lastUpdated: json.lastUpdated || '',
      lastSync: json.lastSync || '',
      reportDate: latest.date || '',
      campaigns: (latest.campaigns || []).map(ensureMetrics)
    };
  }
  return { lastUpdated: '', lastSync: '', reportDate: '', campaigns: [] };
}

function loadData() {
  try {
    const s = JSON.parse(localStorage.getItem(LS_SETTINGS) || '{}');
    state.ghToken = s.ghToken || '';
    state.ghRepo = s.ghRepo || '';
    state.ghBranch = s.ghBranch || 'main';
  } catch (e) {}

  const ls = localStorage.getItem(LS_KEY);
  const remote = window.appData ? migrate(window.appData) : null;
  let local = null;
  try { local = ls ? migrate(JSON.parse(ls)) : null; } catch (e) {}

  if (local && remote) {
    const lt = local.lastUpdated || '';
    const rt = remote.lastUpdated || '';
    state.data = (rt > lt) ? remote : local;
  } else {
    state.data = local || remote || { lastUpdated: '', lastSync: '', reportDate: '', campaigns: [] };
  }

  updateFooter();
}

function saveLocal() {
  state.data.lastUpdated = new Date().toISOString();
  localStorage.setItem(LS_KEY, JSON.stringify(state.data));
  state.saveStatus = 'saved';
  updateFooter();
}

function saveSettings() {
  localStorage.setItem(LS_SETTINGS, JSON.stringify({
    ghToken: state.ghToken,
    ghRepo: state.ghRepo,
    ghBranch: state.ghBranch
  }));
}

function updateFooter() {
  const lastSync = state.data.lastSync || localStorage.getItem('lastSyncTime');
  const el = document.getElementById('lastSync');
  if (el) {
    el.textContent = lastSync
      ? new Date(lastSync).toLocaleString('en-GB', {
          dateStyle: 'medium',
          timeStyle: 'short',
          timeZone: 'America/Los_Angeles'
        }) + ' PT'
      : 'never';
  }
  const ss = document.getElementById('saveStatus');
  if (ss) {
    ss.textContent = state.saveStatus === 'saved' ? 'saved' : 'unsaved';
    ss.className = 'save-indicator ' + state.saveStatus;
  }
}

/* ============================================================
   GITHUB SYNC
============================================================ */
async function syncToGitHub() {
  if (!state.ghToken || !state.ghRepo) {
    toast('Set GitHub token and repo in Settings first', 'error');
    return;
  }
  const parts = state.ghRepo.split('/');
  if (parts.length !== 2) {
    toast('Repo must be in format owner/repo', 'error');
    return;
  }
  const [owner, repo] = parts;
  const path = 'data.js';
  const branch = state.ghBranch || 'main';
  const apiUrl = `https://api.github.com/repos/${owner}/${repo}/contents/${path}`;
  const headers = {
    'Authorization': 'Bearer ' + state.ghToken,
    'Accept': 'application/vnd.github+json',
    'Content-Type': 'application/json'
  };

  toast('Syncing to GitHub…');

  let sha = null;
  try {
    const r = await fetch(apiUrl + '?ref=' + encodeURIComponent(branch), { headers });
    if (r.ok) { const d = await r.json(); sha = d.sha; }
  } catch (e) {}

  // Stamp the sync time into the data itself so other devices see it
  state.data.lastSync = new Date().toISOString();

  const content = 'window.appData = ' + JSON.stringify(state.data, null, 2) + ';\n';
  const b64 = btoa(unescape(encodeURIComponent(content)));

  const body = {
    message: 'Update data.js (' + new Date().toISOString() + ')',
    content: b64,
    branch
  };
  if (sha) body.sha = sha;

  try {
    const res = await fetch(apiUrl, { method: 'PUT', headers, body: JSON.stringify(body) });
    if (res.ok) {
      saveLocal();
      updateFooter();
      toast('Synced! GitHub Pages rebuild ~30s', 'success');
    } else {
      const err = await res.json().catch(() => ({}));
      toast('Sync failed: ' + (err.message || res.status), 'error');
    }
  } catch (e) {
    toast('Network error: ' + e.message, 'error');
  }
}

/* ============================================================
   PARSER (email + linkedin)
============================================================ */
function parseReport(text) {
  const normalized = text.replace(/\r\n/g, '\n').trim();
  const blocks = normalized.split(/(?=^\s*(?:Email outreach|LinkedIn outreach|LinkedIn -|LinkedIn:))/mi)
    .map(b => b.trim()).filter(b => b.length);
  const parsed = [];

  for (const block of blocks) {
    const headerEndIdx = block.search(/\n?\s*(Contacts|Inbox|Sent|Delivered|Bounced|Spam|Replies|Not added|Connection|Connect|Followed|Accept)\s*:/i);
    if (headerEndIdx < 0) continue;
    const headerRaw = block.slice(0, headerEndIdx).trim();
    const rest = block.slice(headerEndIdx);

    // Detect type by header keyword OR by linkedin-specific metric in body
    const linkedinByHeader = /LinkedIn/i.test(headerRaw);
    const linkedinByMetrics = /\b(Connect(ion)?\s+Accepted|Connection\s+Sent|Followed)\s*:/i.test(rest);
    const type = (linkedinByHeader || linkedinByMetrics) ? 'linkedin' : 'email';

    let cleanHeader = headerRaw
      .replace(/^(Email outreach|LinkedIn outreach|LinkedIn -|LinkedIn:)\s*/i, '')
      .trim();
    cleanHeader = cleanHeader.replace(/\s*-?\s*\d{1,2}(:\d{2})?\s*(am|pm)?\s*,\s*[A-Za-z]+\s+\d+.*$/i, '').trim();

    let tag = '';
    let name = cleanHeader;
    const tagMatch = cleanHeader.match(/^-?\s*([A-Z](?:[A-Z0-9\s\-]*[A-Z0-9])?)\s*-\s+(.+)$/);
    if (tagMatch) { tag = tagMatch[1].trim(); name = tagMatch[2].trim(); }

    const metrics = {};
    getMetricsForType(type).forEach(x => metrics[x.key] = { value: 0, delta: 0 });

    const lines = rest.split('\n').map(l => l.trim()).filter(l => l);
    for (const line of lines) {
      const m = line.match(/^([A-Za-z][A-Za-z\s]+?)\s*:\s*([\d.]+)(%?)\s*(?:\(([^)]*)\))?/);
      if (!m) continue;
      const key = ALIAS[m[1].trim().toLowerCase()];
      if (!key) continue;
      const value = parseFloat(m[2]);
      let delta = 0;
      if (m[4]) {
        const dm = m[4].match(/([+-]?[\d.]+)/);
        if (dm) delta = parseFloat(dm[1]);
      }
      metrics[key] = { value, delta };
    }
    if (Object.values(metrics).some(v => v.value || v.delta)) {
      parsed.push({ name, tag, type, metrics });
    }
  }
  return parsed;
}

function importParsed(parsed) {
  let updated = 0, added = 0;
  for (const p of parsed) {
    const existing = state.data.campaigns.find(c => c.name.toLowerCase() === p.name.toLowerCase());
    if (existing) {
      existing.tag = p.tag || existing.tag;
      existing.type = p.type || existing.type || 'email';
      existing.metrics = p.metrics;
      ensureMetrics(existing);
      updated++;
    } else {
      state.data.campaigns.push(ensureMetrics({
        id: uid(), name: p.name, tag: p.tag, type: p.type, stage: 'active', metrics: p.metrics
      }));
      added++;
    }
  }
  saveLocal();
  return { updated, added };
}

============================================================ */
function render() {

function renderCampaignCard(c) {
  const m = c.metrics;
  const tagSlug = c.tag ? c.tag.toLowerCase().replace(/[^a-z]/g, '') : '';
  const isLI = c.type === 'linkedin';

  // Hero metrics — different per type
  let heroHtml;
  if (isLI) {
    const accept = m.acceptRate || { value: 0, delta: 0 };
    const rfq = m.rfqReceived || { value: 0, delta: 0 };
    heroHtml = `
      <div class="hero-metric">
        <div class="label">Accept Rate</div>
        <div class="value">${accept.value}<span style="font-size:18px;color:var(--text-dim)">%</span></div>
        ${deltaHtml(accept.delta, '%')}
      </div>
      <div class="hero-metric highlight">
        <div class="label">RFQ Received</div>
        <div class="value">${rfq.value}</div>
        ${deltaHtml(rfq.delta)}
      </div>`;
  } else {
    heroHtml = `
      <div class="hero-metric">
        <div class="label">Reply Rate</div>
        <div class="value">${m.replyRate.value}<span style="font-size:18px;color:var(--text-dim)">%</span></div>
        ${deltaHtml(m.replyRate.delta, '%')}
      </div>
      <div class="hero-metric highlight">
        <div class="label">RFQ Received</div>
        <div class="value">${m.rfqReceived.value}</div>
        ${deltaHtml(m.rfqReceived.delta)}
      </div>`;
  }

  // Detail rows — only keys relevant to this type
  const detailKeys = isLI
    ? ['inbox','connectionSent','connectAccepted','followed','replies','replyRate']
    : ['contacts','sent','delivered','inbox','bounced','spamBlocked','badData','notAddedToSequence','replies'];

  const detailHtml = detailKeys.filter(k => m[k]).map(k => {
    const def = METRICS.find(x => x.key === k);
    const sfx = def && def.suffix ? def.suffix : '';
    return `<div class="metric">
      <span class="label">${def.label}</span>
      <span class="value-block">
        <span class="value">${formatNum(m[k].value)}${sfx}</span>
        ${deltaHtml(m[k].delta, sfx)}
      </span>
    </div>`;
  }).join('');

  const typeBadge = isLI
    ? `<span class="campaign-tag type-linkedin">LinkedIn</span>`
    : '';

  return `<div class="campaign-card stage-${c.stage}">
    <div class="campaign-header">
      <div class="campaign-title">${escapeHtml(c.name)}</div>
      <div style="display:flex;gap:6px;align-items:center;flex-wrap:wrap;justify-content:flex-end">
        ${typeBadge}
        ${c.tag ? `<span class="campaign-tag tag-${tagSlug}">${escapeHtml(c.tag)}</span>` : ''}
      </div>
    </div>
    <div class="hero-metrics">${heroHtml}</div>
    <div class="metrics-grid">${detailHtml}</div>
  </div>`;
}

function deltaHtml(delta, suffix = '') {
  if (!delta) return `<span class="delta neutral">±0${suffix}</span>`;
  const cls = delta > 0 ? 'positive' : 'negative';
  const sign = delta > 0 ? '+' : '';
  return `<span class="delta ${cls}">${sign}${delta}${suffix}</span>`;
}

function aggregate(campaigns) {
  const t = { contacts: 0, sent: 0, delivered: 0, replies: 0, bounced: 0, rfqReceived: 0, replyRate: 0 };
  campaigns.forEach(c => Object.keys(t).forEach(k => { if (c.metrics[k]) t[k] += c.metrics[k].value; }));
  t.replyRate = t.sent ? Math.round((t.replies / t.sent) * 1000) / 10 : 0;
  return t;
}

function formatNum(n) { return n === undefined || n === null ? '0' : n.toString(); }

function renderFunnel(t) {
  const stages = [
    { key: 'contacts', label: 'Contacts', value: t.contacts, of: t.contacts },
    { key: 'sent', label: 'Sent', value: t.sent, of: t.contacts },
    { key: 'delivered', label: 'Delivered', value: t.delivered, of: t.sent },
    { key: 'replies', label: 'Replies', value: t.replies, of: t.delivered },
    { key: 'rfqReceived', label: 'RFQs', value: t.rfqReceived, of: t.replies }
  ];
  const max = Math.max(...stages.map(s => s.value), 1);
  return `<div class="funnel">${stages.map(s => {
    const pct = (s.value / max) * 100;
    const convRate = s.of ? ((s.value / s.of) * 100).toFixed(1) : '0.0';
    return `<div class="funnel-row">
      <div class="funnel-label">${s.label}</div>
      <div class="funnel-bar-wrap"><div class="funnel-bar" style="width:${pct}%"></div></div>
      <div class="funnel-value">${s.value}</div>
      <div class="funnel-rate">${s.key !== 'contacts' ? convRate + '%' : ''}</div>
    </div>`;
  }).join('')}</div>`;
}

function renderStageBar(counts, total) {
  if (!total) return '';
  const segs = STAGES.map(s => {
    const c = counts[s.id] || 0;
    const pct = (c / total) * 100;
    return { id: s.id, label: s.label, count: c, pct };
  });
  return `<div class="stage-bar-wrap">${segs.map(s => s.pct ?
    `<div class="stage-bar-seg ${s.id}" style="width:${s.pct}%">${s.count}</div>` : ''
  ).join('')}</div>
  <div class="stage-legend">${segs.map(s =>
    `<div class="stage-legend-item"><span class="dot ${s.id}" style="background:${s.id==='active'?'var(--green)':s.id==='followup'?'var(--amber)':'#6b7693'}"></span>${s.label}: ${s.count}</div>`
  ).join('')}</div>`;
}

  let html = `<div class="view">
    <div class="page-intro">
      <div>
        <h2>Manage <em>campaigns</em></h2>
        <div class="subtitle">Edit inline · auto-saved · sync to GitHub when ready</div>
      </div>
    </div>

    <div class="panel">
      <h3>GitHub <em>sync</em></h3>
      <div class="panel-sub">Push current state to your repo so the public site updates</div>
      <div class="settings-grid">
        <div>
          <label>Repository (owner/repo)</label>
          <input id="ghRepo" type="text" placeholder="e.g. yourname/outreach-reports" value="${escapeAttr(state.ghRepo)}" />
        </div>
        <div>
          <label>Branch</label>
          <input id="ghBranch" type="text" placeholder="main" value="${escapeAttr(state.ghBranch || 'main')}" />
        </div>
      </div>
      <div style="margin-bottom:14px">
        <label style="display:block;font-family:var(--mono);font-size:10px;color:var(--text-dim);text-transform:uppercase;letter-spacing:0.12em;margin-bottom:6px">Personal Access Token (fine-grained, Contents: Read+Write)</label>
        <input id="ghToken" type="password" placeholder="github_pat_..." value="${escapeAttr(state.ghToken)}" style="width:100%;background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:10px 12px;color:var(--text);font-family:var(--mono);font-size:13px;outline:none" />
      </div>
      <div style="display:flex;gap:10px;flex-wrap:wrap">
        <button class="primary" id="syncBtn">⬆ Sync to GitHub</button>
        <button class="ghost" id="saveSettingsBtn">Save settings</button>
      </div>
      <div class="help-note" style="margin-top:14px">
        <strong>How to get a token:</strong> GitHub → Settings → Developer settings → Personal access tokens → <strong>Fine-grained tokens</strong> → Generate new token → choose your repo → Permissions → Contents: <code>Read and write</code>. Token saves locally in your browser only — never leaves this device.
      </div>
    </div>

    <div class="panel">
      <h3>Import from <em>report text</em></h3>
      <div class="panel-sub">Paste Email or LinkedIn report → updates matching campaigns, adds new ones</div>
      <textarea class="paste-area" id="pasteArea" placeholder="Email outreach -PREV- Campaign Name&#10;Contacts: 34 (+0)&#10;Sent: 28 (+0)&#10;Replies: 4 (+1)&#10;Reply Rate: 14.3% (+1.2%)&#10;RFQ Received: 1 (+0)&#10;&#10;LinkedIn outreach - RADII-X - GPR LinkedIn&#10;Connection Sent: 50 (+5)&#10;Connect Accepted: 12 (+2)&#10;Accept Rate: 24% (+1%)&#10;Followed: 4 (+1)&#10;Replies: 1 (+0)"></textarea>
      <div style="display:flex;gap:10px;margin-top:12px;flex-wrap:wrap">
        <button class="primary" id="importBtn">Parse & merge</button>
        <button class="ghost" id="clearPasteBtn">Clear</button>
      </div>
    </div>

    <div class="editor-toolbar">
      <button class="primary" id="addBtn">+ Add campaign</button>
      <button class="ghost" id="exportBtn">Download data.js</button>
      <button class="danger" id="resetBtn" style="padding:11px 22px;font-size:14px">Reset everything</button>
    </div>`;

  if (!state.data.campaigns.length) {
    html += `<div class="empty-state"><h3>No campaigns yet</h3><p>Click "+ Add campaign" or paste a report above.</p></div>`;
  }

  for (const stage of grouped) {
    if (!stage.list.length) continue;
    html += `<section class="stage-section">
      <div class="stage-header">
        <span class="stage-dot ${stage.id}"></span>
        <h3>${stage.label}</h3>
        <span class="count">${stage.list.length}</span>
      </div>
      ${stage.list.map(renderEditorCard).join('')}
    </section>`;
  }

  html += `</div>`;
  return html;
}

function renderEditorCard(c) {
  const metricsForType = getMetricsForType(c.type);
  const metricInputs = metricsForType.map(def => `
    <div class="editor-metric">
      <span class="label">${def.label}</span>
      <input type="number" step="any" data-id="${c.id}" data-field="metrics.${def.key}.value" value="${c.metrics[def.key].value}" />
      <input type="number" step="any" class="delta-input" data-id="${c.id}" data-field="metrics.${def.key}.delta" value="${c.metrics[def.key].delta}" placeholder="Δ" title="delta" />
    </div>`).join('');

  return `<div class="editor-card stage-${c.stage}" data-card-id="${c.id}">
    <div class="editor-header">
      <input class="name-input" type="text" data-id="${c.id}" data-field="name" value="${escapeAttr(c.name)}" placeholder="Campaign name" />
      <input type="text" data-id="${c.id}" data-field="tag" value="${escapeAttr(c.tag)}" placeholder="TAG" />
      <select data-id="${c.id}" data-field="type">
        ${CAMPAIGN_TYPES.map(t => `<option value="${t.id}" ${c.type === t.id ? 'selected' : ''}>${t.label}</option>`).join('')}
      </select>
      <select data-id="${c.id}" data-field="stage">
        ${STAGES.map(s => `<option value="${s.id}" ${c.stage === s.id ? 'selected' : ''}>${s.label}</option>`).join('')}
      </select>
      <button class="danger" data-action="delete" data-id="${c.id}">Delete</button>
    </div>
    <div class="editor-metrics">${metricInputs}</div>
  </div>`;
}

/* ============================================================
   EVENT HANDLERS
============================================================ */
function attachHandlers() {
  document.querySelectorAll('nav.tabs button').forEach(b => b.onclick = () => setView(b.dataset.view));

  const reportDateInput = document.getElementById('reportDateInput');
  if (reportDateInput) {
    reportDateInput.onchange = (e) => {
      state.data.reportDate = e.target.value;
      saveLocal();
      render();
    };
  }

  const syncBtn = document.getElementById('syncBtn');
  if (syncBtn) syncBtn.onclick = () => {
    pullSettingsFromInputs();
    saveSettings();
    syncToGitHub();
  };

  const saveSettingsBtn = document.getElementById('saveSettingsBtn');
  if (saveSettingsBtn) saveSettingsBtn.onclick = () => {
    pullSettingsFromInputs();
    saveSettings();
    toast('Settings saved', 'success');
  };

  const addBtn = document.getElementById('addBtn');
  if (addBtn) addBtn.onclick = () => {
    const newCamp = ensureMetrics({
      id: uid(), name: 'New campaign', tag: '', type: 'email', stage: 'active', metrics: {}
    });
    state.data.campaigns.unshift(newCamp);
    saveLocal(); render();
    setTimeout(() => {
      const first = document.querySelector('.editor-card input.name-input');
      if (first) { first.focus(); first.select(); }
    }, 50);
  };

  const exportBtn = document.getElementById('exportBtn');
  if (exportBtn) exportBtn.onclick = () => {
    const content = 'window.appData = ' + JSON.stringify(state.data, null, 2) + ';\n';
    const blob = new Blob([content], { type: 'application/javascript' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'data.js';
    a.click();
    toast('data.js downloaded', 'success');
  };

  const resetBtn = document.getElementById('resetBtn');
  if (resetBtn) resetBtn.onclick = () => {
    if (!confirm('Erase ALL campaigns from local storage? You can restore from data.js by reloading after clearing.')) return;
    state.data = { lastUpdated: '', lastSync: '', reportDate: '', campaigns: [] };
    saveLocal(); render();
  };

  const importBtn = document.getElementById('importBtn');
  if (importBtn) importBtn.onclick = () => {
    const text = document.getElementById('pasteArea').value;
    if (!text.trim()) { toast('Paste a report first', 'error'); return; }
    const parsed = parseReport(text);
    if (!parsed.length) { toast('Could not parse any campaigns', 'error'); return; }
    const r = importParsed(parsed);
    toast(`Updated ${r.updated}, added ${r.added}`, 'success');
    render();
  };

  const clearPasteBtn = document.getElementById('clearPasteBtn');
  if (clearPasteBtn) clearPasteBtn.onclick = () => { document.getElementById('pasteArea').value = ''; };

  document.querySelectorAll('.editor-card input, .editor-card select').forEach(el => {
    el.oninput = handleInlineEdit;
    el.onchange = handleInlineEdit;
  });
  document.querySelectorAll('[data-action="delete"]').forEach(el => {
    el.onclick = () => {
      const id = el.dataset.id;
      const c = state.data.campaigns.find(c => c.id === id);
      if (!c) return;
      if (!confirm(`Delete "${c.name}"?`)) return;
      state.data.campaigns = state.data.campaigns.filter(c => c.id !== id);
      saveLocal(); render();
    };
  });
}

function pullSettingsFromInputs() {
  const repo = document.getElementById('ghRepo');
  const branch = document.getElementById('ghBranch');
  const token = document.getElementById('ghToken');
  if (repo) state.ghRepo = repo.value.trim();
  if (branch) state.ghBranch = branch.value.trim() || 'main';
  if (token) state.ghToken = token.value.trim();
}

let editDebounce = null;
function handleInlineEdit(e) {
  const el = e.target;
  const id = el.dataset.id;
  const field = el.dataset.field;
  if (!id || !field) return;
  const c = state.data.campaigns.find(c => c.id === id);
  if (!c) return;

  let value = el.value;
  if (el.type === 'number') value = value === '' ? 0 : parseFloat(value);
  if (Number.isNaN(value)) value = 0;

  const parts = field.split('.');
  let obj = c;
  for (let i = 0; i < parts.length - 1; i++) obj = obj[parts[i]];
  obj[parts[parts.length - 1]] = value;

  // If type changed, ensure new metrics are added
  if (field === 'type') ensureMetrics(c);

  state.saveStatus = 'unsaved';
  updateFooter();
  clearTimeout(editDebounce);
  editDebounce = setTimeout(() => {
    saveLocal();
    if (field === 'stage' || field === 'type') render();
  }, 400);
}

function setView(view) { state.view = view; render(); }

/* ============================================================
   UTILS
============================================================ */
function uid() { return 'c' + Math.random().toString(36).slice(2, 10); }
function escapeHtml(s) { if (s == null) return ''; return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;'); }
function escapeAttr(s) { return escapeHtml(s); }

let toastTimer = null;
function toast(msg, type = 'success') {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'toast show ' + type;
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => { el.className = 'toast'; }, 2800);
}

/* ============================================================
   INIT
============================================================ */
loadData();
render();
</script>
</body>
</html>
